<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Todo App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }
    </style>
  </head>
  <body class="bg-slate-200 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded shadow-sm max-w-[500px] w-full">
      <h1 class="text-clifford font-bold text-xl">Todo List</h1>

      <form method="GET">
        <div class="flex gap-4 my-2">
          <input
            class="border p-2 rounded flex-1"
            type="text"
            name="task"
            placeholder="Add a new task..."
          />
          <input
            type="submit"
            class="py-2 px-4 bg-black text-white rounded"
            value="Add"
          />
        </div>

        <!-- Render existing tasks as checkboxes -->
        <ul>
          <li class="p-1 hover:bg-gray-200">
            <input type="checkbox" /> Task 1
          </li>
          <li class="p-1 hover:bg-gray-200">
            <input type="checkbox" /> Task 2
          </li>
        </ul>
      </form>
    </div>

    <div
      class="mx-auto flex max-w-sm items-center gap-x-4 rounded-xl bg-white p-6 shadow-lg outline outline-black/5 dark:bg-slate-800 dark:shadow-none dark:-outline-offset-1 dark:outline-white/10"
    >
      <img class="size-12 shrink-0" src="/img/logo.svg" alt="ChitChat Logo" />
      <div>
        <div class="text-xl font-medium text-black dark:text-white">
          ChitChat
        </div>
        <p class="text-gray-500 dark:text-gray-400">You have a new message!</p>
      </div>
    </div>
  </body>
</html>
