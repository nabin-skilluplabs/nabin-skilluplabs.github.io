<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="./app.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <form class="bg-white p-8 rounded-2xl shadow-md text-center w-64 space-y-6">

    <h2 class="text-xl font-semibold text-gray-800">
      Counter
    </h2>

    <!-- Counter Display -->
    <input 
      type="number" 
      name="count"
      value="0"
      id="counter_value"
      class="w-full text-center text-3xl font-medium border-none focus:outline-none"
    >

    <!-- Buttons -->
    <div class="flex justify-between gap-4">
      <button 
        type="submit" 
        name="action" 
        value="decrement"
        id="minus"
        class="w-full py-2 rounded-lg bg-gray-200 hover:bg-gray-300 text-lg font-medium"
      >
        −
      </button>

      <button 
        type="submit" 
        name="action" 
        value="increment"
        id="plus"
        class="w-full py-2 rounded-lg bg-black text-white hover:bg-gray-800 text-lg font-medium"
      >
        +
      </button>
    </div>


    <div
        class="bg-red-700 w-6 h-6 absolute rounded-full"
    ></div>
   
  </form>

</body>
</html>
