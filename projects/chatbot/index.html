<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketing Site Chatbot UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      summary::-webkit-details-marker {
        display: none;
      }
    </style>
    <script src="./app.js" defer></script>
  </head>
  <body class="min-h-screen bg-neutral-100 font-sans text-neutral-900">
   

    <details class="group fixed bottom-6 right-6 z-50">
      <summary
        class="flex h-16 w-16 cursor-pointer list-none items-center justify-center rounded-full border border-neutral-200 bg-neutral-900 text-white shadow-lg shadow-black/10 transition hover:bg-neutral-800 focus:outline-none focus:ring-4 focus:ring-neutral-300"
        aria-label="Open chat"
      >
        <svg
          class="h-7 w-7 group-open:hidden"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M7 10h10" />
          <path d="M7 14h6" />
          <path d="M12 3c5 0 9 3.6 9 8s-4 8-9 8c-1.2 0-2.4-.2-3.5-.6L4 21l1.2-4C3.8 15.5 3 13.8 3 11c0-4.4 4-8 9-8Z" />
        </svg>
        <svg
          class="hidden h-6 w-6 group-open:block"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="m6 6 12 12" />
          <path d="M18 6 6 18" />
        </svg>
      </summary>

      <section
        class="absolute bottom-20 right-0 hidden h-[36rem] w-[calc(100vw-2rem)] max-w-sm flex-col overflow-hidden rounded-xl border border-neutral-200 bg-white shadow-2xl shadow-black/10 group-open:flex"
        aria-label="Chat window"
      >
        <header class="border-b border-neutral-200 bg-neutral-50 px-5 py-4">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-xl font-semibold text-neutral-900">Chat with us</p>
              <p class="mt-1 text-sm text-neutral-500">
                Ask a question and we’ll point you in the right direction.
              </p>
            </div>
            <span class="rounded-full bg-neutral-900 px-2.5 py-1 text-xs font-medium text-white">
              Online
            </span>
          </div>
        </header>

        <div id="chat_message_container" class="flex-1 space-y-4 overflow-y-auto bg-white px-5 py-5">
            <!-- Messages will be dynamically inserted here -->
        </div>

        <form id="chat-form" class="border-t border-neutral-200 bg-white p-4">
          <label for="chat-message" class="sr-only">Type your message</label>
          <div class="flex items-center gap-3 rounded-2xl border border-neutral-200 bg-neutral-50 p-2">
            <input
              id="chat-message"
              type="text"
              placeholder="Type your message..."
              class="w-full border-0 bg-transparent px-3 py-2 text-sm text-neutral-700 placeholder:text-neutral-400 focus:outline-none focus:ring-0"
            />
            <button
              type="submit"
              class="rounded-xl bg-neutral-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-neutral-800"
            >
              Send
            </button>
          </div>
        </form>
      </section>
    </details>
  </body>
</html>
